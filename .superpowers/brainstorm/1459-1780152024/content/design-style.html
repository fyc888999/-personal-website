<h2>选择你偏好的设计风格</h2>
<p class="subtitle">这将决定网站的整体视觉基调</p>

<div class="cards">
  <div class="card" data-choice="dark-minimal" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); height: 200px; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
      <div style="text-align: center; color: #e0e0e0;">
        <div style="font-size: 24px; margin-bottom: 10px; font-weight: 300;">深色极简</div>
        <div style="font-size: 14px; opacity: 0.7;">深蓝/深灰背景，白色文字</div>
      </div>
    </div>
    <div class="card-body">
      <h3>深色极简风</h3>
      <p>深色背景搭配浅色文字，现代感强，适合展示技术类项目。护眼且专业。</p>
    </div>
  </div>

  <div class="card" data-choice="light-clean" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); height: 200px; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
      <div style="text-align: center; color: #333;">
        <div style="font-size: 24px; margin-bottom: 10px; font-weight: 500;">浅色清爽</div>
        <div style="font-size: 14px; opacity: 0.7;">白色/浅灰背景，深色文字</div>
      </div>
    </div>
    <div class="card-body">
      <h3>浅色清爽风</h3>
      <p>明亮干净的浅色系，阅读舒适，适合个人展示。给人亲和、专业的印象。</p>
    </div>
  </div>

  <div class="card" data-choice="gradient-vibrant" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 200px; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
      <div style="text-align: center; color: #fff;">
        <div style="font-size: 24px; margin-bottom: 10px; font-weight: 600;">渐变活力</div>
        <div style="font-size: 14px; opacity: 0.9;">彩色渐变背景，视觉冲击力强</div>
      </div>
    </div>
    <div class="card-body">
      <h3>渐变活力风</h3>
      <p>大胆的渐变色彩搭配，充满活力和创意感。适合展示个人特色和项目创意。</p>
    </div>
  </div>
</div>
