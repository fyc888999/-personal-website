<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>符奕宸的猜数字游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 380px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .difficulty {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .diff-btn {
            padding: 8px 18px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: #fff;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .diff-btn:hover {
            border-color: #43cea2;
            color: #43cea2;
        }

        .diff-btn:focus-visible {
            outline: 3px solid #43cea2;
            outline-offset: 2px;
        }

        .diff-btn.active {
            border-color: #43cea2;
            background: #43cea2;
            color: #fff;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            padding: 14px 18px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
        }

        .input-group input:focus {
            border-color: #43cea2;
        }

        .input-group button {
            padding: 14px 24px;
            font-size: 16px;
            background: #43cea2;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .input-group button:hover {
            background: #3ab890;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(67, 206, 162, 0.3);
        }

        .input-group button:focus-visible {
            outline: 3px solid #185a9d;
            outline-offset: 2px;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .info-item {
            color: #666;
            font-size: 14px;
        }

        .info-item span {
            color: #185a9d;
            font-weight: 700;
            font-size: 18px;
        }

        .message {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 16px;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .message.hint {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .message.warn {
            background: #fff3e0;
            color: #e65100;
        }

        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            font-weight: 600;
        }

        .message.fail {
            background: #ffebee;
            color: #c62828;
            font-weight: 600;
        }

        .history {
            margin-top: 10px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-title {
            color: #777;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .history-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 14px;
            background: #f8f9fa;
            transition: background 0.2s;
        }

        .history-list li:nth-child(odd) {
            background: #f0f2f5;
        }

        .history-list .step {
            color: #999;
            font-size: 12px;
            min-width: 40px;
        }

        .history-list .value {
            font-weight: 600;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .history-list .hint-text {
            font-size: 13px;
            min-width: 80px;
            text-align: right;
        }

        .history-list .hint-text.low {
            color: #c62828;
        }

        .history-list .hint-text.high {
            color: #1565c0;
        }

        .history-list .hint-text.correct {
            color: #2e7d32;
            font-weight: 600;
        }

        .history-list .hint-text.giveup {
            color: #999;
            font-style: italic;
        }

        .btn-row {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn-reset, .btn-giveup {
            padding: 12px 30px;
            font-size: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
        }

        .btn-reset {
            background: #185a9d;
            color: #fff;
        }

        .btn-reset:hover {
            background: #134b83;
            transform: translateY(-2px);
        }

        .btn-giveup {
            background: #eee;
            color: #999;
            font-size: 13px;
            padding: 12px 20px;
        }

        .btn-giveup:hover {
            background: #ddd;
            color: #666;
        }

        .btn-reset.show, .btn-giveup.show {
            display: inline-block;
        }

        .best-score {
            margin-top: 16px;
            padding: 10px;
            background: #fffde7;
            border-radius: 10px;
            font-size: 13px;
            color: #f57f17;
            display: none;
        }

        .best-score.show {
            display: block;
        }

        /* 抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-6px); }
            20%, 40%, 60%, 80% { transform: translateX(6px); }
        }

        .shake {
            animation: shake 0.5s ease;
        }

        /* 消息淡入上滑 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.animate {
            animation: fadeInUp 0.3s ease;
        }

        /* 庆祝弹跳 */
        @keyframes celebrate {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(0.95); }
            45% { transform: scale(1.08); }
            60% { transform: scale(0.98); }
            75% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .message.celebrate {
            animation: celebrate 0.8s ease;
            box-shadow: 0 0 20px rgba(67, 206, 162, 0.4), 0 0 40px rgba(67, 206, 162, 0.2);
        }

        /* 温度条 */
        .thermometer {
            margin-bottom: 20px;
            display: none;
        }

        .thermometer-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #777;
            margin-bottom: 4px;
        }

        .thermometer-bar {
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        .thermometer-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: width 0.4s ease, background 0.4s ease;
        }

        /* 按钮按压效果 */
        .btn-press {
            transition: transform 0.1s ease;
        }

        .btn-press:active {
            transform: scale(0.95) !important;
        }

        /* 彩纸画布 */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* 无障碍：减少动画 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            #confettiCanvas {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="confettiCanvas" aria-hidden="true"></canvas>
    <main class="game">
        <h1>猜数字</h1>
        <p class="subtitle" id="subtitle">我想了一个 1 ~ 100 的数字，猜猜看？</p>

        <div class="difficulty" role="group" aria-label="难度选择">
            <button class="diff-btn btn-press" data-max="50" aria-pressed="false">简单 (1-50)</button>
            <button class="diff-btn btn-press active" data-max="100" aria-pressed="true">中等 (1-100)</button>
            <button class="diff-btn btn-press" data-max="200" aria-pressed="false">困难 (1-200)</button>
        </div>

        <div class="input-group">
            <input type="number" id="guessInput" min="1" max="100" placeholder="输入数字" aria-label="输入你猜的数字" autofocus>
            <button class="btn-press" id="btnGuess">猜测</button>
        </div>

        <div class="info-bar">
            <div class="info-item">猜测次数：<span id="attempts">0</span></div>
            <div class="info-item">用时：<span id="timer">0:00</span></div>
            <div class="info-item">范围：<span id="range">1 - 100</span></div>
        </div>

        <div class="thermometer" id="thermometer">
            <div class="thermometer-label">
                <span>差很远</span>
                <span>差一点</span>
                <span>很接近</span>
            </div>
            <div class="thermometer-bar">
                <div class="thermometer-fill" id="thermometerFill"></div>
            </div>
        </div>

        <div class="message" id="message" role="status" aria-live="polite">输入数字开始游戏吧！</div>

        <div class="history" id="history" style="display: none;">
            <div class="history-title">猜测记录：</div>
            <ul class="history-list" id="historyList"></ul>
        </div>

        <div class="btn-row">
            <button class="btn-giveup btn-press" id="btnGiveup">看答案</button>
            <button class="btn-reset btn-press" id="btnReset">再来一局</button>
        </div>

        <div class="best-score" id="bestScore"></div>
    </main>

    <script>
    (function() {
        'use strict';

        // === 音效系统 ===
        let audioCtx = null;

        function ensureAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, duration, type) {
            ensureAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type || 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            osc.onended = () => { osc.disconnect(); gain.disconnect(); };
        }

        let correctSoundTimeouts = [];

        function playCorrectSound() {
            // 欢快的上升旋律：C5 → E5 → G5 → C6
            correctSoundTimeouts.push(setTimeout(() => playTone(523, 0.12, 'sine'), 0));
            correctSoundTimeouts.push(setTimeout(() => playTone(659, 0.12, 'sine'), 80));
            correctSoundTimeouts.push(setTimeout(() => playTone(784, 0.12, 'sine'), 160));
            correctSoundTimeouts.push(setTimeout(() => playTone(1047, 0.25, 'sine'), 240));
            // 和弦叠加
            correctSoundTimeouts.push(setTimeout(() => playTone(659, 0.3, 'triangle'), 240));
            correctSoundTimeouts.push(setTimeout(() => playTone(784, 0.3, 'triangle'), 260));
        }

        function stopCorrectSound() {
            correctSoundTimeouts.forEach(id => clearTimeout(id));
            correctSoundTimeouts = [];
        }

        function playWrongSound() { playTone(200, 0.2, 'square'); }
        function playWarnSound() { playTone(300, 0.1, 'triangle'); }

        // === 庆祝特效系统 ===
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let celebrationAnimId = null;
        let celebrationPaused = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(resizeCanvas, 100);
        }, { passive: true });
        resizeCanvas();

        const COLORS = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bff', '#ffa500', '#ff4081', '#00e5ff', '#76ff03'];

        // 粒子类型：burst(爆炸) / confetti(彩纸) / firework(烟花) / sparkle(闪烁)
        function createBurst(cx, cy, count) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
                const speed = Math.random() * 8 + 4;
                particles.push({
                    type: 'burst',
                    x: cx, y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 4 + 2,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)],
                    opacity: 1,
                    life: 1,
                    decay: Math.random() * 0.015 + 0.01
                });
            }
        }

        function createConfettiRain(count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    type: 'confetti',
                    x: Math.random() * canvas.width,
                    y: Math.random() * -canvas.height,
                    w: Math.random() * 12 + 5,
                    h: Math.random() * 6 + 3,
                    color: COLORS[Math.floor(Math.random() * COLORS.length)],
                    vx: (Math.random() - 0.5) * 3,
                    vy: Math.random() * 3 + 2,
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 12,
                    opacity: 1,
                    life: 1,
                    decay: 0.003
                });
            }
        }

        function createFirework(cx, cy) {
            const count = 40;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count;
                const speed = Math.random() * 5 + 2;
                const color = COLORS[Math.floor(Math.random() * COLORS.length)];
                particles.push({
                    type: 'firework',
                    x: cx, y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 3 + 1,
                    color: color,
                    opacity: 1,
                    life: 1,
                    decay: Math.random() * 0.012 + 0.008,
                    trail: []
                });
            }
        }

        function createSparkles(count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    type: 'sparkle',
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * 0.6,
                    size: Math.random() * 3 + 1,
                    color: '#fff',
                    opacity: 0,
                    phase: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.05 + 0.03,
                    life: 1,
                    decay: 0.005
                });
            }
        }

        function animateCelebration() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;

            particles.forEach(p => {
                if (p.life <= 0) return;
                alive = true;

                if (p.type === 'burst' || p.type === 'firework') {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.08;
                    p.vx *= 0.99;
                    p.life -= p.decay;
                    p.opacity = Math.max(0, p.life);

                    if (p.type === 'firework') {
                        p.trail.push({ x: p.x, y: p.y, opacity: p.opacity });
                        if (p.trail.length > 6) p.trail.shift();
                        p.trail.forEach(t => {
                            ctx.beginPath();
                            ctx.arc(t.x, t.y, p.size * 0.5, 0, Math.PI * 2);
                            ctx.fillStyle = p.color;
                            ctx.globalAlpha = t.opacity * 0.3;
                            ctx.fill();
                        });
                    }

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.opacity;
                    ctx.fill();

                } else if (p.type === 'confetti') {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.rotation += p.rotSpeed;
                    p.vy += 0.04;
                    p.life -= p.decay;
                    if (p.y > canvas.height * 0.7) p.life -= 0.01;
                    p.opacity = Math.max(0, p.life);

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();

                } else if (p.type === 'sparkle') {
                    p.phase += p.speed;
                    p.opacity = Math.max(0, Math.sin(p.phase) * 0.8) * p.life;
                    p.life -= p.decay;

                    const s = p.size * (0.5 + Math.sin(p.phase) * 0.5);
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = p.color;
                    // 十字星
                    ctx.fillRect(-s / 2, -s * 1.5, s, s * 3);
                    ctx.fillRect(-s * 1.5, -s / 2, s * 3, s);
                    ctx.restore();
                }
            });

            if (alive) {
                celebrationAnimId = requestAnimationFrame(animateCelebration);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                celebrationAnimId = null;
            }
        }

        function triggerCelebration() {
            if (celebrationAnimId) cancelAnimationFrame(celebrationAnimId);
            particles = [];

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // 阶段1：中心爆炸
            createBurst(cx, cy, 50);

            // 阶段2：彩纸雨（延迟200ms）
            setTimeout(() => createConfettiRain(150), 200);

            // 阶段3：烟花绽放（延迟500ms）
            setTimeout(() => {
                createFirework(canvas.width * 0.25, canvas.height * 0.3);
                createFirework(canvas.width * 0.75, canvas.height * 0.25);
            }, 500);

            // 阶段4：第二波烟花 + 闪烁（延迟900ms）
            setTimeout(() => {
                createFirework(canvas.width * 0.5, canvas.height * 0.2);
                createFirework(canvas.width * 0.15, canvas.height * 0.4);
                createFirework(canvas.width * 0.85, canvas.height * 0.35);
                createSparkles(30);
            }, 900);

            // 阶段5：第二波彩纸（延迟1200ms）
            setTimeout(() => createConfettiRain(80), 1200);

            animateCelebration();
        }

        function stopCelebration() {
            if (celebrationAnimId) {
                cancelAnimationFrame(celebrationAnimId);
                celebrationAnimId = null;
            }
            particles = [];
            celebrationPaused = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 页面可见性：切换标签时暂停/恢复
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && celebrationAnimId) {
                cancelAnimationFrame(celebrationAnimId);
                celebrationAnimId = null;
                celebrationPaused = true;
            } else if (!document.hidden && celebrationPaused && particles.length > 0) {
                celebrationPaused = false;
                animateCelebration();
            }
        });

        // === 计时器 ===
        let timerStartTime = null;
        let timerInterval = null;

        function startTimer() {
            if (timerStartTime) return;
            timerStartTime = Date.now();
            timerInterval = setInterval(updateTimerDisplay, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function resetTimer() {
            stopTimer();
            timerStartTime = null;
            document.getElementById('timer').textContent = '0:00';
        }

        function updateTimerDisplay() {
            const elapsed = Math.floor((Date.now() - timerStartTime) / 1000);
            const min = Math.floor(elapsed / 60);
            const sec = elapsed % 60;
            document.getElementById('timer').textContent = `${min}:${sec.toString().padStart(2, '0')}`;
        }

        function getElapsedSeconds() {
            return timerStartTime ? Math.floor((Date.now() - timerStartTime) / 1000) : 0;
        }

        // === 温度条 ===
        const thermometerEl = document.getElementById('thermometer');
        const thermometerFill = document.getElementById('thermometerFill');

        function updateThermometer(guessValue) {
            const distance = Math.abs(guessValue - state.answer);
            const closeness = 1 - (distance / state.maxNumber);
            const percent = Math.max(5, Math.min(100, closeness * 100));

            thermometerEl.style.display = 'block';
            thermometerFill.style.width = percent + '%';

            let color;
            if (percent < 40) color = '#ff6b6b';
            else if (percent < 70) color = '#ffd93d';
            else color = '#6bcb77';
            thermometerFill.style.background = color;
        }

        function resetThermometer() {
            thermometerEl.style.display = 'none';
            thermometerFill.style.width = '0%';
        }

        // === 最高分 ===
        const STORAGE_KEY = 'guessGame_bestScores';

        function loadBestScores() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
            catch { return {}; }
        }

        function saveBestScore(maxNum, attempts, seconds) {
            const scores = loadBestScores();
            const key = String(maxNum);
            const current = scores[key];
            // 以猜测次数为主要标准，时间为次要标准
            if (!current || attempts < current.attempts || (attempts === current.attempts && seconds < current.seconds)) {
                scores[key] = { attempts, seconds, date: new Date().toLocaleDateString() };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(scores));
                return true;
            }
            return false;
        }

        function showBestScore() {
            const scores = loadBestScores();
            const score = scores[String(state.maxNumber)];
            const el = document.getElementById('bestScore');
            if (score) {
                const min = Math.floor(score.seconds / 60);
                const sec = score.seconds % 60;
                el.textContent = `最佳记录：${score.attempts} 次 / ${min}:${sec.toString().padStart(2, '0')} (${score.date})`;
                el.classList.add('show');
            } else {
                el.classList.remove('show');
            }
        }

        // === 动画辅助 ===
        const input = document.getElementById('guessInput');
        const messageEl = document.getElementById('message');

        function shakeInput() {
            input.classList.remove('shake');
            void input.offsetWidth;
            input.classList.add('shake');
        }

        function animateMessage() {
            messageEl.classList.remove('animate');
            void messageEl.offsetWidth;
            messageEl.classList.add('animate');
        }

        // === 提示文字 ===
        function getHintText(closeness, status, isHistory) {
            if (status === 'correct') return isHistory ? '猜对了！' : '';
            const arrow = status === 'low' ? '↑' : '↓';
            if (closeness < 0.05) return (isHistory ? '就差一点' : '就差一点！再') + (isHistory ? (status === 'low' ? ' ↑' : ' ↓') : arrow);
            if (closeness < 0.15) return (isHistory ? '快了' : '快了，再') + (isHistory ? (status === 'low' ? ' ↑' : ' ↓') : arrow);
            return (status === 'low' ? '太小了' : '太大了') + (isHistory ? (status === 'low' ? ' ↑' : ' ↓') : ' ' + arrow);
        }

        // === 游戏状态 ===
        const state = {
            maxNumber: 100,
            answer: 0,
            attempts: 0,
            guesses: [],
            gameOver: false,
            rangeMin: 1,
            rangeMax: 100,
            started: false
        };

        const subtitleEl = document.getElementById('subtitle');
        const attemptsEl = document.getElementById('attempts');
        const rangeEl = document.getElementById('range');
        const historyEl = document.getElementById('history');
        const historyListEl = document.getElementById('historyList');
        const btnReset = document.getElementById('btnReset');
        const btnGiveup = document.getElementById('btnGiveup');
        const btnGuess = document.getElementById('btnGuess');

        // 初始化
        state.answer = Math.floor(Math.random() * state.maxNumber) + 1;
        showBestScore();

        // 事件绑定
        input.addEventListener('keydown', e => { if (e.key === 'Enter') makeGuess(); });
        btnGuess.addEventListener('click', makeGuess);
        btnReset.addEventListener('click', resetGame);
        btnGiveup.addEventListener('click', giveUp);

        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.diff-btn').forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-pressed', 'false');
                });
                btn.classList.add('active');
                btn.setAttribute('aria-pressed', 'true');
                setDifficulty(parseInt(btn.dataset.max));
            });
        });

        // 防重复点击
        let guessLock = false;

        function makeGuess() {
            if (state.gameOver || guessLock) return;

            const raw = input.value.trim();
            const value = parseInt(raw);

            // 严格整数验证
            if (raw === '' || isNaN(value) || !Number.isInteger(value) || String(value) !== raw) {
                showMessage('请输入一个整数', 'warn');
                shakeInput();
                playWarnSound();
                return;
            }

            if (value < state.rangeMin || value > state.rangeMax) {
                showMessage(`请输入 ${state.rangeMin} ~ ${state.rangeMax} 的整数`, 'warn');
                shakeInput();
                playWarnSound();
                return;
            }

            // 第一次猜测启动计时
            if (!state.started) {
                state.started = true;
                startTimer();
                btnGiveup.classList.add('show');
            }

            guessLock = true;

            state.attempts++;
            attemptsEl.textContent = state.attempts;

            const distance = Math.abs(value - state.answer);
            const closeness = distance / state.maxNumber;

            if (value === state.answer) {
                stopTimer();
                const elapsed = getElapsedSeconds();
                const isNewBest = saveBestScore(state.maxNumber, state.attempts, elapsed);
                showMessage(`恭喜！答案就是 ${state.answer}，你用了 ${state.attempts} 次猜中！${isNewBest ? ' 新纪录！' : ''}`, 'success');
                messageEl.classList.add('celebrate');
                state.guesses.push({ value, status: 'correct', closeness: 0 });
                updateThermometer(value);
                triggerCelebration();
                playCorrectSound();
                endGame();
            } else if (value < state.answer) {
                showMessage(getHintText(closeness, 'low', false), 'hint');
                state.guesses.push({ value, status: 'low', closeness });
                if (value + 1 > state.rangeMin) state.rangeMin = value + 1;
                shakeInput();
                updateThermometer(value);
                playWrongSound();
            } else {
                showMessage(getHintText(closeness, 'high', false), 'hint');
                state.guesses.push({ value, status: 'high', closeness });
                if (value - 1 < state.rangeMax) state.rangeMax = value - 1;
                shakeInput();
                updateThermometer(value);
                playWrongSound();
            }

            rangeEl.textContent = `${state.rangeMin} - ${state.rangeMax}`;
            renderHistory();
            input.value = '';
            input.focus();

            setTimeout(() => { guessLock = false; }, 150);
        }

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message';
            messageEl.classList.add(type);
            animateMessage();
        }

        function renderHistory() {
            historyEl.style.display = 'block';
            historyListEl.innerHTML = state.guesses.map((g, i) => {
                const hintText = g.status === 'giveup' ? '放弃了' : getHintText(g.closeness, g.status, true);
                return `<li>
                    <span class="step">#${i + 1}</span>
                    <span class="value">${g.value}</span>
                    <span class="hint-text ${g.status}">${hintText}</span>
                </li>`;
            }).join('');
            historyEl.scrollTop = historyEl.scrollHeight;
        }

        function endGame() {
            state.gameOver = true;
            input.disabled = true;
            btnReset.classList.add('show');
            btnGiveup.classList.remove('show');
            showBestScore();
        }

        function giveUp() {
            if (state.gameOver) return;
            stopTimer();
            showMessage(`答案是 ${state.answer}，再试一次吧！`, 'fail');
            state.guesses.push({ value: '?', status: 'giveup', closeness: 1 });
            renderHistory();
            endGame();
        }

        function setDifficulty(max) {
            state.maxNumber = max;
            resetGame();
        }

        function resetGame() {
            stopCorrectSound();
            resetTimer();
            stopCelebration();

            state.answer = Math.floor(Math.random() * state.maxNumber) + 1;
            state.attempts = 0;
            state.guesses = [];
            state.gameOver = false;
            state.rangeMin = 1;
            state.rangeMax = state.maxNumber;
            state.started = false;

            resetThermometer();
            subtitleEl.textContent = `我想了一个 1 ~ ${state.maxNumber} 的数字，猜猜看？`;
            input.min = 1;
            input.max = state.maxNumber;
            attemptsEl.textContent = '0';
            rangeEl.textContent = `1 - ${state.maxNumber}`;
            messageEl.textContent = '输入数字开始游戏吧！';
            messageEl.className = 'message';
            messageEl.classList.remove('celebrate');
            historyEl.style.display = 'none';
            historyListEl.innerHTML = '';
            btnReset.classList.remove('show');
            btnGiveup.classList.remove('show');
            input.disabled = false;
            input.value = '';
            input.focus();
            showBestScore();
        }
    })();
    </script>
</body>
</html>
